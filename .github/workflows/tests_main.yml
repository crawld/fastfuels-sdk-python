name: Test on PR to main

on:
  pull_request:
    branches: [ main ]

env:
    FASTFUELS_API_KEY: ${{ secrets.FASTFUELS_API_KEY }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Install dependencies
      run: uv sync
    - name: Run pytest
      env:
        TEST_ENV: local
      run: |
        cd tests/
        uv run pytest
