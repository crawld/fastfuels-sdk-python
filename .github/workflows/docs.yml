name: build mkdocs

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install docs dependencies
        run: uv sync --group docs
      - run: uv run mkdocs gh-deploy --force --clean --verbose
