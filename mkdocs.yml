# mkdocs.yml
site_name: FastFuels SDK Documentation

theme:
  name: "material"
  features:
    - content.code.copy

nav:
  - Home: index.md
  - v1 (current):
    - How-To Guides:
      - Authentication: v1/guides/authentication.md
      - Domains: v1/guides/domains.md
      - Inventories: v1/guides/inventories.md
      - Point Clouds: v1/guides/point_clouds.md
      - Features: v1/guides/features.md
      - Grids: v1/guides/grids.md
    - Tutorials:
      - Export to QUIC-Fire: v1/tutorials/export_to_quicfire.md
      - ALS Point Cloud: v1/tutorials/point_cloud_example.md
    - Reference: v1/reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: table
            docstring_options:
              ignore_init_summary: true
            show_root_heading: true
            show_source: false
            members_order: source
            annotations_path: brief
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
